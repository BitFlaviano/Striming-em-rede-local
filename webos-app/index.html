<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmartTV Media</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #111; color: #fff; font-family: sans-serif; overflow: hidden; height: 100vh; width: 100vw; }
    #server-frame { width: 100%; height: 100%; border: none; display: block; }
    #config-screen {
      display: none;
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.92);
      justify-content: center;
      align-items: center;
      flex-direction: column;
      z-index: 10;
    }
    #config-screen.visible { display: flex; }
    #config-screen h1 { font-size: 2rem; margin-bottom: 40px; }
    #config-screen input {
      width: 400px; padding: 16px 20px; font-size: 1.4rem;
      background: #222; color: #fff; border: 2px solid #555;
      border-radius: 8px; text-align: center; outline: none;
    }
    #config-screen input:focus { border-color: #4fc3f7; }
    #config-screen .hint { color: #888; margin-top: 12px; font-size: 0.9rem; }
    #config-screen .btn {
      margin-top: 20px; padding: 14px 60px; font-size: 1.2rem;
      background: #1565C0; color: #fff; border: none; border-radius: 8px;
      cursor: pointer;
    }
    #config-screen .btn:focus { outline: 2px solid #fff; }
    #config-screen .btn-secondary {
      background: transparent;
      border: 2px solid #555;
      padding: 12px 40px;
      font-size: 1rem;
    }
    #config-screen .btn-secondary:focus { border-color: #4fc3f7; }
    #loading-screen {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      display: flex; justify-content: center; align-items: center;
      background: #111; flex-direction: column; gap: 20px;
    }
    .spinner {
      width: 50px; height: 50px; border: 4px solid #333;
      border-top-color: #4fc3f7; border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading-screen p { color: #888; font-size: 1rem; }
  </style>
</head>
<body>

  <div id="config-screen" class="visible">
    <h1>SmartTV Media</h1>
    <input type="text" id="server-ip" placeholder="192.168.0.196" />
    <p class="hint">Digite o IP do computador onde roda o servidor</p>
    <button class="btn" id="btn-connect">Conectar</button>
    <button class="btn btn-secondary" id="btn-scan">🔍 Buscar servidor na rede</button>
    <p class="hint" style="margin-top:30px;color:#666;font-size:0.75rem">
      No computador, execute o servidor e veja o IP na tela.<br>
      Ou abra http://localhost:3000 no computador e veja o IP no topo da página.
    </p>
  </div>

  <div id="loading-screen" style="display:none">
    <div class="spinner"></div>
    <p>Conectando ao servidor...</p>
  </div>

  <iframe id="server-frame" allowfullscreen allow="autoplay; encrypted-media; fullscreen"></iframe>

  <script>
    const STORAGE_KEY = 'smarttv_server_ip';

    function getSavedIp() {
      try { return localStorage.getItem(STORAGE_KEY); } catch(e) { return null; }
    }

    function saveIp(ip) {
      try { localStorage.setItem(STORAGE_KEY, ip); } catch(e) {}
    }

    function loadServer(ip) {
      document.getElementById('config-screen').classList.remove('visible');
      document.getElementById('config-screen').style.display = 'none';
      document.getElementById('loading-screen').style.display = 'flex';
      const frame = document.getElementById('server-frame');
      frame.style.display = 'none';
      frame.src = 'http://' + ip + ':3000';
      frame.onload = function() {
        document.getElementById('loading-screen').style.display = 'none';
        frame.style.display = 'block';
        frame.focus();
      };
      frame.onerror = function() {
        document.getElementById('loading-screen').style.display = 'none';
        document.getElementById('config-screen').style.display = 'flex';
        document.getElementById('config-screen').classList.add('visible');
        alert('Falha ao conectar ao servidor ' + ip);
      };
    }

    function showConfig() {
      document.getElementById('config-screen').style.display = 'flex';
      document.getElementById('config-screen').classList.add('visible');
      document.getElementById('server-frame').style.display = 'none';
      document.getElementById('loading-screen').style.display = 'none';
      setTimeout(function() {
        document.getElementById('server-ip').focus();
      }, 200);
    }

    document.getElementById('btn-connect').addEventListener('click', function() {
      var ip = document.getElementById('server-ip').value.trim();
      if (!ip) { ip = document.getElementById('server-ip').placeholder; }
      saveIp(ip);
      loadServer(ip);
    });

    document.getElementById('server-ip').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') { document.getElementById('btn-connect').click(); }
    });

    document.getElementById('btn-scan').addEventListener('click', async function() {
      this.textContent = '🔍 Buscando...';
      this.disabled = true;
      var input = document.getElementById('server-ip');
      var baseIp = input.placeholder.substring(0, input.placeholder.lastIndexOf('.') + 1);
      for (var i = 1; i <= 20; i++) {
        var testIp = baseIp + i;
        input.value = testIp;
        input.placeholder = testIp;
        try {
          var resp = await fetch('http://' + testIp + ':3000/api/network-info', { signal: AbortSignal.timeout(2000) });
          if (resp.ok) {
            input.value = testIp;
            this.textContent = '✅ Servidor encontrado!';
            setTimeout(function() { document.getElementById('btn-connect').click(); }, 500);
            return;
          }
        } catch(e) {}
      }
      input.value = '';
      input.placeholder = '192.168.0.196';
      this.textContent = '🔍 Nenhum servidor encontrado';
      this.disabled = false;
      setTimeout(function() { document.getElementById('btn-scan').textContent = '🔍 Buscar servidor na rede'; }, 3000);
    });

    // Key handler for remote control
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Backspace' || e.key === 'Escape') {
        var config = document.getElementById('config-screen');
        if (config.classList.contains('visible')) return;
        if (e.key === 'Backspace') {
          var frame = document.getElementById('server-frame');
          try {
            if (frame.contentWindow && frame.contentWindow.history.length > 1) {
              frame.contentWindow.history.back();
              return;
            }
          } catch(ex) {}
        }
        showConfig();
      }
      if (e.key === 'Menu' || e.key === 'F1') {
        showConfig();
      }
    });

    // Check saved IP
    var saved = getSavedIp();
    if (saved) {
      loadServer(saved);
    } else {
      document.getElementById('server-ip').focus();
    }
  </script>
</body>
</html>
